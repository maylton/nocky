name: Apply Home playback identity updates

on:
  push:
    branches:
      - codex/home-v2-render-reuse
    paths:
      - scripts/apply-home-playback-identity-update.py
      - .github/workflows/apply-home-playback-identity.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: codex/home-v2-render-reuse
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply-home-playback-identity-update.py

      - name: Format Rust
        run: cargo fmt --all

      - name: Remove temporary patch machinery
        run: |
          rm scripts/apply-home-playback-identity-update.py
          rm .github/workflows/apply-home-playback-identity.yml

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: update Home playback controls by identity"
          git push origin HEAD:codex/home-v2-render-reuse
