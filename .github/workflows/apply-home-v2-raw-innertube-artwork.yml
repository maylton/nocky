name: Apply raw InnerTube Home artwork enrichment

on:
  push:
    branches:
      - codex/home-v2-raw-innertube-artwork
    paths:
      - scripts/apply-home-v2-raw-innertube-artwork.py
      - .github/workflows/apply-home-v2-raw-innertube-artwork.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: codex/home-v2-raw-innertube-artwork
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply-home-v2-raw-innertube-artwork.py

      - name: Run focused Python tests
        run: python3 -m unittest tests.test_youtube_feed

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add helpers/nocky_youtube.py helpers/nocky_youtube_feed.py tests/test_youtube_feed.py
          git commit -m "fix: preserve raw InnerTube artwork on Home V2"
          git push origin HEAD:codex/home-v2-raw-innertube-artwork
