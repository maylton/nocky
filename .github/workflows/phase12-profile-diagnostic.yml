name: Phase 12 Rustfmt Diagnostic

on:
  push:
    branches:
      - codex/profile-discovery-status
  pull_request:
    branches:
      - main
    paths:
      - 'src/youtube/backend.rs'
      - '.github/workflows/phase12-profile-diagnostic.yml'

permissions:
  contents: read

jobs:
  rustfmt-diff:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Install Rust formatting component
        run: rustup component add rustfmt
      - name: Print exact rustfmt diff
        run: |
          cargo fmt --all
          git diff --exit-code -- src/youtube/backend.rs
