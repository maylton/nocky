name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  apply-home-cover-fix:
    if: github.event_name == 'pull_request' && github.head_ref == 'codex/home-v2-polish-and-dynamic-playlists'
    name: Apply reviewed Home cover patch
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: codex/home-v2-polish-and-dynamic-playlists
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply-home-cover-fairness-fix.py

      - name: Format Rust
        run: cargo fmt --all

      - name: Restore workflow and remove temporary files
        run: |
          git show origin/main:.github/workflows/ci.yml > .github/workflows/ci.yml
          rm -f scripts/apply-home-cover-fairness-fix.py
          rm -f .github/workflows/apply-home-cover-fairness-fix.yml

      - name: Commit final implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: distribute Home artwork caching across sections"
          git push origin HEAD:codex/home-v2-polish-and-dynamic-playlists

  quality:
    name: Rust quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: fedora:44

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install system dependencies
        shell: bash
        run: |
          dnf --assumeyes --setopt=install_weak_deps=False install \
            ca-certificates \
            curl \
            gcc \
            gcc-c++ \
            gdk-pixbuf2-devel \
            git \
            glib2-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            gtk4-devel \
            libadwaita-devel \
            make \
            openssl-devel \
            pkgconf-pkg-config \
            python3

      - name: Install Rust toolchain
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain none

          source "$HOME/.cargo/env"
          rustup toolchain install stable \
            --profile minimal \
            --component rustfmt \
            --component clippy

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run quality gate
        shell: bash
        run: bash ./scripts/quality-gate.sh
