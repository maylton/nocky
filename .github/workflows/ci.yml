name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rust quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: fedora:44

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install system dependencies
        shell: bash
        run: |
          dnf --assumeyes --setopt=install_weak_deps=False install \
            ca-certificates \
            curl \
            gcc \
            gcc-c++ \
            gdk-pixbuf2-devel \
            git \
            glib2-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            gtk4-devel \
            libadwaita-devel \
            make \
            openssl-devel \
            pkgconf-pkg-config \
            python3

      - name: Install Rust toolchain
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain none

          source "$HOME/.cargo/env"
          rustup toolchain install stable \
            --profile minimal \
            --component rustfmt \
            --component clippy

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run quality gate and capture failure
        shell: bash
        run: |
          set +e
          bash ./scripts/quality-gate.sh > /tmp/quality-gate.log 2>&1
          status=$?
          cat /tmp/quality-gate.log

          if [[ $status -ne 0 && ! -f docs/CI_FAILURE.txt ]]; then
            tail -n 320 /tmp/quality-gate.log > /tmp/quality-gate-tail.log
            python3 - <<'PY' > /tmp/payload.json
          import base64
          import json
          from pathlib import Path

          content = base64.b64encode(Path('/tmp/quality-gate-tail.log').read_bytes()).decode()
          print(json.dumps({
              'message': 'ci: capture Quality Gate failure details',
              'content': content,
              'branch': 'codex/home-v2-polish-and-dynamic-playlists',
          }))
          PY
            curl --fail-with-body --silent --show-error \
              --request PUT \
              --header "Accept: application/vnd.github+json" \
              --header "Authorization: Bearer ${GH_TOKEN}" \
              --header "X-GitHub-Api-Version: 2022-11-28" \
              https://api.github.com/repos/maylton/nocky/contents/docs/CI_FAILURE.txt \
              --data-binary @/tmp/payload.json
          fi

          exit $status
