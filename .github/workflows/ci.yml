name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rust quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: fedora:44

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install system dependencies
        shell: bash
        run: |
          dnf --assumeyes --setopt=install_weak_deps=False install \
            ca-certificates \
            curl \
            gcc \
            gcc-c++ \
            gdk-pixbuf2-devel \
            git \
            glib2-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            gtk4-devel \
            libadwaita-devel \
            make \
            openssl-devel \
            pkgconf-pkg-config \
            python3

      - name: Install Rust toolchain
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain none

          source "$HOME/.cargo/env"
          rustup toolchain install stable \
            --profile minimal \
            --component rustfmt \
            --component clippy

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run quality gate
        shell: bash
        run: |
          set -o pipefail
          bash ./scripts/quality-gate.sh 2>&1 | tee /tmp/nocky-quality-gate.log

      - name: Prepare rustfmt output
        if: always()
        shell: bash
        run: |
          cargo fmt --all
          mkdir -p /tmp/nocky-rustfmt/src/ui/settings
          cp src/config.rs /tmp/nocky-rustfmt/src/config.rs
          cp src/ui/settings/shell_direct.rs /tmp/nocky-rustfmt/src/ui/settings/shell_direct.rs
          cp src/ui/settings/stream_sources.rs /tmp/nocky-rustfmt/src/ui/settings/stream_sources.rs

      - name: Upload quality gate log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quality-gate-log
          path: /tmp/nocky-quality-gate.log
          if-no-files-found: error
          retention-days: 3

      - name: Upload rustfmt output
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: rustfmt-output
          path: /tmp/nocky-rustfmt
          if-no-files-found: error
          retention-days: 3
