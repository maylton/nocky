name: Quality Gate

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
      - "codex/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Rust quality gate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    container:
      image: fedora:44

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6
        with:
          persist-credentials: false

      - name: Install system dependencies
        shell: bash
        run: |
          dnf --assumeyes --setopt=install_weak_deps=False install \
            ca-certificates \
            curl \
            gcc \
            gcc-c++ \
            gdk-pixbuf2-devel \
            git \
            glib2-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            gtk4-devel \
            libadwaita-devel \
            make \
            openssl-devel \
            pkgconf-pkg-config \
            python3

      - name: Install Rust toolchain
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain none

          source "$HOME/.cargo/env"
          rustup toolchain install stable \
            --profile minimal \
            --component rustfmt \
            --component clippy

          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Run quality gate
        shell: bash
        run: |
          set -o pipefail
          bash ./scripts/quality-gate.sh 2>&1 | tee /tmp/quality-gate.log

      - name: Capture quality diagnostics
        if: failure()
        shell: bash
        run: |
          mkdir -p /tmp/nocky-quality-diagnostics/src/app/controller
          mkdir -p /tmp/nocky-quality-diagnostics/src/youtube
          cp /tmp/quality-gate.log /tmp/nocky-quality-diagnostics/quality-gate.log
          cargo fmt --all || true
          cp src/app/controller/youtube_playlist_add.rs \
            /tmp/nocky-quality-diagnostics/src/app/controller/
          cp src/app/controller/youtube_playlist_metadata.rs \
            /tmp/nocky-quality-diagnostics/src/app/controller/
          cp src/youtube/playlist_create.rs \
            /tmp/nocky-quality-diagnostics/src/youtube/

      - name: Upload quality diagnostics
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: quality-diagnostics
          path: /tmp/nocky-quality-diagnostics
          if-no-files-found: error
          retention-days: 1
