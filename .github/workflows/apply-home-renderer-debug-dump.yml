name: Apply Home renderer diagnostics

on:
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && github.head_ref == 'codex/home-v2-raw-innertube-artwork'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          ref: codex/home-v2-raw-innertube-artwork
          fetch-depth: 0

      - name: Apply diagnostics integration
        run: python3 scripts/apply-home-renderer-debug-dump.py

      - name: Validate diagnostics and helper suite
        run: |
          python3 -m unittest tests.test_youtube_home_debug -v
          python3 -m unittest discover -s tests -p 'test_youtube_*.py' -q

      - name: Remove temporary patch files
        run: |
          rm scripts/apply-home-renderer-debug-dump.py
          rm .github/workflows/apply-home-renderer-debug-dump.yml

      - name: Commit diagnostics
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: add opt-in sanitized Home renderer diagnostics"
          git push origin HEAD:codex/home-v2-raw-innertube-artwork
