name: Apply direct InnerTube Home parser

on:
  push:
    branches:
      - codex/home-v2-raw-innertube-artwork
    paths:
      - scripts/apply-direct-innertube-home-parser.py
      - .github/workflows/apply-direct-innertube-home-parser.yml
  pull_request:
    branches:
      - main

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]' && (github.event_name == 'push' || github.head_ref == 'codex/home-v2-raw-innertube-artwork')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout implementation branch
        uses: actions/checkout@v6
        with:
          ref: codex/home-v2-raw-innertube-artwork
          fetch-depth: 0

      - name: Apply integration patch
        run: python3 scripts/apply-direct-innertube-home-parser.py

      - name: Run direct parser tests
        id: tests
        shell: bash
        run: |
          set +e
          python3 -m unittest tests.test_youtube_innertube_home -v > /tmp/direct-parser-tests.log 2>&1
          first=$?
          python3 -m unittest discover -s tests -p 'test_youtube_*.py' -q > /tmp/all-youtube-tests.log 2>&1
          second=$?
          echo "$first" > /tmp/direct-parser-tests.status
          echo "$second" > /tmp/all-youtube-tests.status
          cat /tmp/direct-parser-tests.log
          cat /tmp/all-youtube-tests.log
          if [[ $first -ne 0 || $second -ne 0 ]]; then
            exit 1
          fi

      - name: Upload parser diagnostics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: direct-home-parser-tests
          path: |
            /tmp/direct-parser-tests.log
            /tmp/all-youtube-tests.log
            /tmp/direct-parser-tests.status
            /tmp/all-youtube-tests.status

      - name: Remove temporary patch machinery
        if: success()
        run: |
          rm scripts/apply-direct-innertube-home-parser.py
          rm .github/workflows/apply-direct-innertube-home-parser.yml

      - name: Commit implementation
        if: success()
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "feat: parse Home V2 directly from raw InnerTube renderers"
          git push origin HEAD:codex/home-v2-raw-innertube-artwork
