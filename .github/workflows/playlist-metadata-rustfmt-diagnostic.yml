name: Formatting Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/youtube/playlist_create.rs'
      - 'src/app/controller/mod.rs'
      - 'src/app/controller/callbacks.rs'
      - 'src/app/controller/youtube_playlist_metadata.rs'
      - '.github/workflows/playlist-metadata-rustfmt-diagnostic.yml'

permissions:
  contents: read

jobs:
  formatting:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - run: rustup component add rustfmt
      - name: Format files
        run: |
          cargo fmt --all
          git diff -- \
            src/youtube/playlist_create.rs \
            src/app/controller/mod.rs \
            src/app/controller/callbacks.rs \
            src/app/controller/youtube_playlist_metadata.rs \
            > formatting.txt
      - uses: actions/upload-artifact@v4
        with:
          name: formatting-output
          path: formatting.txt
      - name: Check formatting
        run: test ! -s formatting.txt
