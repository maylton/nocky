name: Like Mutation Rustfmt Diagnostic

on:
  pull_request:
    branches:
      - codex/profile-discovery-status
    paths:
      - 'src/youtube/like_mutation.rs'
      - 'tests/youtube_like_mutation.rs'
      - '.github/workflows/like-mutation-diagnostic.yml'

permissions:
  contents: read

jobs:
  rustfmt-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Clone branch quietly
        run: |
          git clone --quiet --depth=1 \
            --branch codex/youtube-like-mutation-foundation \
            https://github.com/maylton/nocky.git repo
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Print exact rustfmt diff
        working-directory: repo
        run: |
          rustfmt --edition 2021 \
            src/youtube/like_mutation.rs \
            tests/youtube_like_mutation.rs
          git diff --exit-code -- \
            src/youtube/like_mutation.rs \
            tests/youtube_like_mutation.rs
