name: Like Mutation Diagnostic

on:
  push:
    branches:
      - codex/youtube-like-mutation-foundation

permissions:
  contents: read

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - run: rustup component add rustfmt
      - name: Check focused formatting
        run: |
          rustfmt --edition 2021 --check \
            src/youtube/like_mutation.rs \
            tests/youtube_like_mutation.rs

  standalone-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Compile with warnings denied
        run: |
          mkdir -p target/diagnostic
          rustc --edition 2021 --test \
            -D warnings \
            tests/youtube_like_mutation.rs \
            -o target/diagnostic/youtube_like_mutation
      - name: Run focused tests
        run: target/diagnostic/youtube_like_mutation
