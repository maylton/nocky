name: Rustfmt diagnostic

on:
  pull_request:

permissions:
  contents: read

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Capture rustfmt changes
        run: |
          cargo fmt --all
          git diff -- src/youtube/assisted_login.rs > rustfmt.diff
          test -s rustfmt.diff || printf 'NO_DIFF\n' > rustfmt.diff
      - uses: actions/upload-artifact@v4
        with:
          name: rustfmt-diff
          path: rustfmt.diff
          if-no-files-found: error
