name: Playlist Mutation Rustfmt Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - 'src/youtube/playlist_mutation_contract.rs'
      - 'tests/youtube_playlist_mutation_contract.rs'
      - '.github/workflows/playlist-mutation-diagnostic.yml'

permissions:
  contents: read

jobs:
  rustfmt-diff:
    runs-on: ubuntu-latest
    steps:
      - name: Clone branch quietly
        run: |
          git clone --quiet --depth=1 \
            --branch codex/youtube-playlist-mutation-architecture \
            https://github.com/maylton/nocky.git repo
      - name: Install rustfmt
        run: rustup component add rustfmt
      - name: Print exact rustfmt diff
        working-directory: repo
        run: |
          rustfmt --edition 2021 \
            src/youtube/playlist_mutation_contract.rs \
            tests/youtube_playlist_mutation_contract.rs
          git diff --exit-code -- \
            src/youtube/playlist_mutation_contract.rs \
            tests/youtube_playlist_mutation_contract.rs
