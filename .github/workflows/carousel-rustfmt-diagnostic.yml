name: Carousel rustfmt diagnostic

on:
  push:
    branches:
      - codex/material-expressive-buttons-foundation

permissions:
  contents: write

jobs:
  rustfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/material-expressive-buttons-foundation
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Apply rustfmt
        run: cargo fmt --all
      - name: Commit rustfmt output
        run: |
          if git diff --quiet; then
            echo "No rustfmt changes required."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/ui/widgets/material_card.rs
          git commit -m "style: apply rustfmt to carousel mask fix"
          git push origin HEAD:codex/material-expressive-buttons-foundation
