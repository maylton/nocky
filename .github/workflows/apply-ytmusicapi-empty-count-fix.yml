name: Apply ytmusicapi empty-count fix

on:
  push:
    branches:
      - codex/home-v2-polish-and-dynamic-playlists
    paths:
      - scripts/apply-ytmusicapi-empty-count-fix.py
      - .github/workflows/apply-ytmusicapi-empty-count-fix.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: codex/home-v2-polish-and-dynamic-playlists
          fetch-depth: 0

      - name: Set up Python runtime
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install YouTube helper dependencies
        run: python -m pip install -r requirements-youtube.txt

      - name: Apply compatibility fix
        run: python3 scripts/apply-ytmusicapi-empty-count-fix.py

      - name: Run focused regression test
        run: python3 -m unittest tests.test_youtube_playlist_count_compat

      - name: Remove temporary patch machinery
        run: |
          rm scripts/apply-ytmusicapi-empty-count-fix.py
          rm .github/workflows/apply-ytmusicapi-empty-count-fix.yml

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: handle empty YouTube playlist counts"
          git push origin HEAD:codex/home-v2-polish-and-dynamic-playlists
