name: Apply performance pass

on:
  push:
    branches:
      - codex/home-v2-raw-innertube-artwork-pr85

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: codex/home-v2-raw-innertube-artwork-pr85
          fetch-depth: 0
      - name: Decode one-shot patch
        shell: bash
        run: |
          cat <<'PAYLOAD' | base64 -d | gzip -d > /tmp/apply_performance_pass.py
          
          PAYLOAD
          python -m py_compile /tmp/apply_performance_pass.py
      - name: Apply source transformations
        run: python /tmp/apply_performance_pass.py
      - name: Format Rust sources
        run: |
          rustup component add rustfmt
          cargo fmt --all
      - name: Validate patch shape
        run: git diff --check
      - name: Commit performance pass
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "perf: streamline Home and queue rendering"
          git push origin HEAD:codex/home-v2-raw-innertube-artwork-pr85
