name: Apply final Home V2 fixes

on:
  push:
    branches:
      - codex/home-v2-polish-and-dynamic-playlists
    paths:
      - scripts/apply-chip-carousel-height-fix.py
      - .github/workflows/apply-final-home-v2-fixes.yml

permissions:
  contents: write

jobs:
  apply:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v6
        with:
          ref: codex/home-v2-polish-and-dynamic-playlists
          fetch-depth: 0

      - name: Apply patch
        run: python3 scripts/apply-chip-carousel-height-fix.py

      - name: Format Rust
        run: cargo fmt --all

      - name: Run focused feed tests
        run: python3 -m unittest tests.test_youtube_feed

      - name: Remove temporary patch machinery
        run: |
          rm scripts/apply-chip-carousel-height-fix.py
          rm .github/workflows/apply-final-home-v2-fixes.yml

      - name: Commit implementation
        run: |
          git config user.name github-actions[bot]
          git config user.email 41898282+github-actions[bot]@users.noreply.github.com
          git add -A
          git commit -m "fix: complete Home V2 artwork and chip spacing"
          git push origin HEAD:codex/home-v2-polish-and-dynamic-playlists
