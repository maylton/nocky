name: Home Geometry Source Fix

on:
  push:
    branches:
      - codex/material-expressive-buttons-foundation

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  patch:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v6
        with:
          ref: codex/material-expressive-buttons-foundation
          persist-credentials: true
          fetch-depth: 0
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Restore Home presentation hierarchy
        id: patch
        continue-on-error: true
        run: |
          set -o pipefail
          python3 - <<'PY' 2>&1 | tee /tmp/home-geometry-fix.log
          from pathlib import Path
          import re

          path = Path('src/browser.rs')
          text = path.read_text(encoding='utf-8')

          replacements = [
              ('Self::Featured | Self::Compact => 128,', 'Self::Featured => 176,\n            Self::Compact => 128,'),
              ('Self::Featured | Self::Compact => 152,', 'Self::Featured => 196,\n            Self::Compact => 152,'),
              ('Self::Featured | Self::Compact => 188,', 'Self::Featured => 252,\n            Self::Compact => 188,'),
              ('Self::Featured | Self::Compact => 168,', 'Self::Featured => 220,\n            Self::Compact => 168,'),
              ('Self::Featured | Self::Compact => 196,', 'Self::Featured => 268,\n            Self::Compact => 196,'),
              ('Self::Featured | Self::Compact => 6,', 'Self::Featured => 14,\n            Self::Compact => 6,'),
              ('Self::Featured | Self::Compact => 8,', 'Self::Featured => 0,\n            Self::Compact => 8,'),
              ('Self::Featured | Self::Compact => 18,', 'Self::Featured => 20,\n            Self::Compact => 18,'),
          ]

          for old, new in replacements:
              count = text.count(old)
              print(f'{old!r}: {count} match(es)')
              if count != 1:
                  raise SystemExit(f'expected exactly one match for {old!r}')
              text = text.replace(old, new, 1)

          old_rows = '''            Self::Featured | Self::Compact if width <= 760 && item_count > 2 => 2,
            Self::Featured | Self::Compact => 1,
            Self::TrackRows => self.track_rows(item_count),'''
          new_rows = '''            Self::Featured => 1,
            Self::Compact if width <= 760 && item_count > 2 => 2,
            Self::Compact => 1,
            Self::TrackRows => self.track_rows(item_count),'''
          if text.count(old_rows) != 1:
              raise SystemExit('rail_rows uniform branch not found exactly once')
          text = text.replace(old_rows, new_rows, 1)

          test_pattern = re.compile(
              r'    #\[test\]\n'
              r'    fn featured_and_compact_cards_keep_uniform_carousel_geometry\(\) \{.*?'
              r'(?=    #\[test\]\n    fn compact_geometry_matches_metrolist_card_scale)',
              re.S,
          )
          test_replacement = '''    #[test]
    fn featured_geometry_is_larger_than_compact() {
        assert!(
            HomeSectionPresentation::Featured.artwork_size()
                > HomeSectionPresentation::Compact.artwork_size()
        );
        assert!(
            HomeSectionPresentation::Featured.card_width()
                > HomeSectionPresentation::Compact.card_width()
        );
        assert!(
            HomeSectionPresentation::Featured.card_height()
                > HomeSectionPresentation::Compact.card_height()
        );
        assert!(
            HomeSectionPresentation::Featured.outer_width()
                > HomeSectionPresentation::Compact.outer_width()
        );
        assert!(
            HomeSectionPresentation::Featured.outer_height()
                > HomeSectionPresentation::Compact.outer_height()
        );
    }

'''
          text, count = test_pattern.subn(test_replacement, text, count=1)
          print(f'uniform test replacements: {count}')
          if count != 1:
              raise SystemExit('uniform geometry test block was not found')

          height_pattern = re.compile(
              r'        assert_eq!\(\n'
              r'            HomeSectionPresentation::Featured\.scroller_height\(1\),\n'
              r'            HomeSectionPresentation::Compact\.scroller_height\(1\)\n'
              r'        \);'
          )
          text, count = height_pattern.subn(
              '        assert_eq!(HomeSectionPresentation::Featured.scroller_height(1), 288);',
              text,
              count=1,
          )
          print(f'scroller height replacements: {count}')
          if count != 1:
              raise SystemExit('uniform Featured scroller-height assertion was not found')

          wrap_pattern = re.compile(
              r'    #\[test\]\n'
              r'    fn featured_rail_wraps_like_compact_on_narrow_sections\(\) \{.*?\n'
              r'    \}\n',
              re.S,
          )
          wrap_replacement = '''    #[test]
    fn featured_rail_stays_single_row() {
        assert_eq!(HomeSectionPresentation::Featured.rail_rows(900, 8), 1);
        assert_eq!(HomeSectionPresentation::Featured.rail_rows(760, 8), 1);
        assert_eq!(HomeSectionPresentation::Featured.rail_rows(480, 8), 1);
    }
'''
          text, count = wrap_pattern.subn(wrap_replacement, text, count=1)
          print(f'Featured wrap test replacements: {count}')
          if count != 1:
              raise SystemExit('Featured wrap regression test was not found')

          path.write_text(text, encoding='utf-8')
          print('browser.rs hierarchy patched')
          PY
          status=${PIPESTATUS[0]}
          if [[ $status -eq 0 ]]; then
            cargo fmt --all 2>&1 | tee -a /tmp/home-geometry-fix.log
            status=${PIPESTATUS[0]}
          fi
          exit $status
      - name: Commit source hierarchy fix
        id: commit
        if: steps.patch.outcome == 'success'
        continue-on-error: true
        run: |
          if git diff --quiet -- src/browser.rs; then
            echo "Home geometry is already aligned" | tee -a /tmp/home-geometry-fix.log
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add src/browser.rs
          git commit -m "fix: restore Featured Home geometry in source" 2>&1 | tee -a /tmp/home-geometry-fix.log
          git push origin HEAD:codex/material-expressive-buttons-foundation 2>&1 | tee -a /tmp/home-geometry-fix.log
      - name: Publish source-fix diagnostic
        if: always()
        env:
          GH_TOKEN: ${{ github.token }}
          PATCH_OUTCOME: ${{ steps.patch.outcome }}
          COMMIT_OUTCOME: ${{ steps.commit.outcome }}
        run: |
          python3 - <<'PY'
          import json
          import os
          import urllib.request
          from pathlib import Path

          log_path = Path('/tmp/home-geometry-fix.log')
          log = log_path.read_text(encoding='utf-8') if log_path.exists() else 'No diagnostic log was produced.'
          if len(log) > 50000:
              log = log[-50000:]
          body = (
              '<!-- home-geometry-source-fix -->\n'
              '## Home geometry source-fix diagnostic\n\n'
              f"Patch outcome: **{os.environ.get('PATCH_OUTCOME', 'unknown')}**  \n"
              f"Commit outcome: **{os.environ.get('COMMIT_OUTCOME', 'unknown')}**\n\n"
              '```text\n' + log + '\n```'
          )
          request = urllib.request.Request(
              'https://api.github.com/repos/maylton/nocky/issues/98/comments',
              data=json.dumps({'body': body}).encode('utf-8'),
              headers={
                  'Authorization': f"Bearer {os.environ['GH_TOKEN']}",
                  'Accept': 'application/vnd.github+json',
                  'X-GitHub-Api-Version': '2022-11-28',
                  'Content-Type': 'application/json',
              },
              method='POST',
          )
          with urllib.request.urlopen(request) as response:
              print(response.status)
          PY
      - name: Fail when source fix failed
        if: steps.patch.outcome != 'success' || steps.commit.outcome == 'failure'
        run: exit 1
