name: Playlist Metadata Quality Diagnostic

on:
  pull_request:
    branches:
      - main
    paths:
      - 'helpers/nocky_playlist_metadata.py'
      - 'helpers/nocky_playlist_mutations.py'
      - 'helpers/nocky_youtube_playlist_create.py'
      - 'src/app/controller/callbacks.rs'
      - 'src/app/controller/mod.rs'
      - 'src/app/controller/youtube_playlist_metadata.rs'
      - 'src/youtube/playlist_create.rs'
      - 'tests/test_youtube_playlist_metadata_packaged.py'
      - '.github/workflows/playlist-metadata-quality-diagnostic.yml'

permissions:
  contents: read

jobs:
  diagnostic:
    runs-on: ubuntu-latest
    container: fedora:44
    steps:
      - uses: actions/checkout@v6
        with:
          show-progress: false
      - name: Install system dependencies
        run: |
          dnf --assumeyes --setopt=install_weak_deps=False install \
            gcc gcc-c++ make pkgconf-pkg-config curl \
            gtk4-devel libadwaita-devel \
            gstreamer1-devel gstreamer1-plugins-base-devel \
            gstreamer1-plugins-base gstreamer1-plugins-good gstreamer1-plugins-bad-free \
            webkitgtk6.0-devel python3 python3-pip python3-gobject \
            libsecret desktop-file-utils hicolor-icon-theme
      - name: Install Rust toolchain
        run: |
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --component rustfmt,clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"
      - name: Capture quality output
        shell: bash
        run: |
          set +e
          ./scripts/quality-gate.sh > quality.log 2>&1
          status=$?
          tail -n 300 quality.log > quality-tail.txt
          printf '%s\n' "$status" > quality-status.txt
          exit 0
      - uses: actions/upload-artifact@v4
        with:
          name: playlist-metadata-quality-output
          path: |
            quality-tail.txt
            quality-status.txt
