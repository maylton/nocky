name: Phase 11 assisted login runner

on:
  pull_request:
    branches:
      - automation/phase11-login-base
    types:
      - opened
      - reopened
      - synchronize

permissions:
  contents: write

concurrency:
  group: phase11-assisted-login-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  validate:
    if: github.head_ref == 'codex/youtube-assisted-login'
    runs-on: ubuntu-latest
    timeout-minutes: 45

    container:
      image: fedora:44

    env:
      CARGO_TERM_COLOR: always
      RUST_BACKTRACE: "1"

    steps:
      - name: Install checkout prerequisites
        shell: bash
        run: dnf --assumeyes --setopt=install_weak_deps=False install ca-certificates git

      - name: Checkout implementation branch
        uses: actions/checkout@v6
        with:
          ref: codex/youtube-assisted-login
          persist-credentials: true
          fetch-depth: 0

      - name: Detect pending patch
        id: pending
        shell: bash
        run: |
          if [[ -f scripts/temporary_assisted_login_patch.py ]]; then
            echo 'apply=true' >> "$GITHUB_OUTPUT"
          else
            echo 'apply=false' >> "$GITHUB_OUTPUT"
          fi

      - name: Install build dependencies
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: |
          dnf --assumeyes --setopt=install_weak_deps=False install \
            curl \
            gcc \
            gcc-c++ \
            gdk-pixbuf2-devel \
            glib2-devel \
            gstreamer1-devel \
            gstreamer1-plugins-base-devel \
            gtk4-devel \
            libadwaita-devel \
            make \
            openssl-devel \
            pkgconf-pkg-config \
            python3 \
            webkitgtk6.0-devel

      - name: Install Rust toolchain
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: |
          curl --proto '=https' --tlsv1.2 --silent --show-error --fail \
            https://sh.rustup.rs \
            | sh -s -- -y --profile minimal --default-toolchain none
          source "$HOME/.cargo/env"
          rustup toolchain install stable \
            --profile minimal \
            --component rustfmt \
            --component clippy
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

      - name: Apply deterministic implementation patch
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          {
            python3 - <<'PY'
          from pathlib import Path

          path = Path("scripts/temporary_assisted_login_patch.py")
          text = path.read_text(encoding="utf-8")
          marker = '\nreplace(\n    "install.sh",'
          start = text.find(marker)
          if start >= 0:
              text = text[:start] + "\n"
              path.write_text(text, encoding="utf-8")
          PY
            python3 scripts/temporary_assisted_login_patch.py
            if [[ -f scripts/temporary_assisted_login_followup.py ]]; then
              python3 scripts/temporary_assisted_login_followup.py
            fi
            python3 - <<'PY'
          from pathlib import Path

          path = Path("install.sh")
          text = path.read_text(encoding="utf-8")

          def replace(old: str, new: str, expected: int = 1) -> None:
              global text
              count = text.count(old)
              if count != expected:
                  raise SystemExit(
                      f"install.sh: expected {expected} occurrence(s), found {count}: {old!r}"
                  )
              text = text.replace(old, new)

          replace(
              "        gir1.2-secret-1 libsecret-1-0 curl unzip\n",
              "        gir1.2-secret-1 libsecret-1-0 libwebkitgtk-6.0-dev curl unzip\n",
          )
          replace(
              "        python3 python3-pip python3-gobject libsecret curl unzip\n",
              "        python3 python3-pip python3-gobject libsecret webkitgtk6.0-devel curl unzip\n",
              expected=2,
          )
          replace(
              "        python3 python3-pip python3-gobject libsecret-1-0 curl unzip\n",
              "        python3 python3-pip python3-gobject libsecret-1-0 'pkgconfig(webkitgtk-6.0)' curl unzip\n",
          )
          replace(
              "        python python-pip python-gobject libsecret curl unzip\n",
              "        python python-pip python-gobject libsecret webkitgtk-6.0 curl unzip\n",
          )
          replace(
              "for package in gtk4 libadwaita-1 gstreamer-1.0; do\n",
              "required_packages=(gtk4 libadwaita-1 gstreamer-1.0)\n$INSTALL_YOUTUBE && required_packages+=(webkitgtk-6.0)\nfor package in \"${required_packages[@]}\"; do\n",
          )
          replace(
              'cd "$ROOT_DIR"\necho "Building ${APP_NAME} ${VERSION} in release mode..."\ncargo build --release --locked\n',
              'cd "$ROOT_DIR"\necho "Building ${APP_NAME} ${VERSION} in release mode..."\nif $INSTALL_YOUTUBE; then\n  cargo build --release --locked\nelse\n  cargo build --release --locked --no-default-features\nfi\n',
          )
          path.write_text(text, encoding="utf-8")
          PY
          } > assisted-login-patch.log 2>&1
          status=$?
          cat assisted-login-patch.log
          exit "$status"

      - name: Upload patch diagnostics
        if: always() && steps.pending.outputs.apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: assisted-login-patch-log
          path: assisted-login-patch.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Refresh dependency lockfile
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: cargo check --all-targets --all-features

      - name: Format sources
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: cargo fmt --all

      - name: Validate minimal build without WebKit
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: |
          set +e
          {
            cargo check --locked --all-targets --no-default-features
            cargo test --locked --all-targets --no-default-features
            cargo clippy --locked --all-targets --no-default-features -- -D warnings
          } > assisted-login-minimal.log 2>&1
          status=$?
          tail -n 180 assisted-login-minimal.log
          exit "$status"

      - name: Upload minimal-build diagnostics
        if: always() && steps.pending.outputs.apply == 'true'
        uses: actions/upload-artifact@v4
        with:
          name: assisted-login-minimal-log
          path: assisted-login-minimal.log
          if-no-files-found: ignore
          retention-days: 1

      - name: Run complete feature-enabled quality gate
        if: steps.pending.outputs.apply == 'true'
        shell: bash
        run: bash ./scripts/quality-gate.sh

      - name: Commit validated implementation
        if: steps.pending.outputs.apply == 'true' && success()
        shell: bash
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          rm -f scripts/temporary_assisted_login_patch.py scripts/temporary_assisted_login_followup.py
          rm -f assisted-login-patch.log assisted-login-minimal.log
          git add -A
          git diff --cached --check
          git commit -m "feat: add assisted YouTube Music login"
          git push origin HEAD:codex/youtube-assisted-login
